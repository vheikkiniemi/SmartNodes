name: smartnodes
services:
  node-vault:
    image: postgres:latest
    container_name: node-vault
    hostname: node-vault
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    env_file:
      - .env
    volumes:
      - pgroot:/var/lib/postgresql
      - ./node-vault:/docker-entrypoint-initdb.d
    networks:
      - smartnode-net
    restart: unless-stopped
  node-hub:
    build: ./node-hub
    container_name: node-hub
    hostname: node-hub
    depends_on:
      - node-vault
    environment:
      PGHOST: node-vault
    env_file:
      - .env
    ports:
      - "${HUB_PORT}:${HUB_PORT}"
    volumes:
      - ./node-hub/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    networks:
      - smartnode-net
    restart: unless-stopped

  node-ingest:
    build: ./node-ingest
    container_name: node-ingest
    hostname: node-ingest
    depends_on:
      - node-hub
      - node-vault
    environment:
      PGHOST: node-vault
    env_file:
      - .env
    volumes:
      - ./node-ingest/ingest.py:/app/ingest.py
      - ./node-ingest/init-dynsec.sh:/init-dynsec.sh
    networks:
      - smartnode-net
    restart: unless-stopped

  node-gateway:
    build: ./node-gateway
    image: node-gateway
    container_name: node-gateway  
    hostname: node-gateway
    depends_on:
      - node-vault
    environment:
      PGHOST: node-vault
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    volumes:
      - ./node-gateway:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - smartnode-net
    restart: unless-stopped

volumes:
  pgroot: {}
  mosquitto_data: {}

networks:
  smartnode-net:
    driver: bridge